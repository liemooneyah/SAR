<style>
:root{--navy:#003B6F;--ok:#1A7A45;--ok-bg:#EAF6EF;--er:#B5291B;--er-bg:#FDEDEB;--wn:#A06C0A;--wn-bg:#FEF7E6;--inf:#1B5E8A;--inf-bg:#EAF3FB;--bg:#EDF1F7;--bdr:#D1DAE6;--muted:#6B7D90;--txt:#1C2B3A}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);padding-bottom:30px}
.hdr{position:sticky;top:0;z-index:100;background:var(--navy);color:#fff;padding:12px 14px 10px}
.hdr h1{font-size:14px;font-weight:700}.hdr p{font-size:10px;opacity:.7;margin-top:1px}
.hdr-row{display:flex;align-items:center;justify-content:space-between}

.inf label{display:block;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:2px}
.inf input,.inf select{width:100%;border:1px solid var(--bdr);border-radius:6px;padding:7px 8px;font-size:13px;color:var(--txt);background:#fff;-webkit-appearance:none}
.tbar{position:sticky;top:62px;z-index:99;background:#fff;display:flex;border-bottom:2px solid var(--bdr)}
.tab{flex:1;border:none;background:none;cursor:pointer;padding:9px 2px 8px;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;font-weight:700;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px}
.tab svg{width:18px;height:18px;stroke-width:2}
.tab.on{color:var(--navy);border-bottom-color:var(--navy)}
.tbadge{background:var(--er);color:#fff;font-size:9px;font-weight:800;padding:1px 5px;border-radius:8px;margin-left:2px;display:none}
.tbadge.v{display:inline-block}
.panel{display:none;padding:10px 10px 20px}
.panel.on{display:block}
.srow{display:flex;gap:6px;margin-bottom:9px}
.sc{flex:1;background:#fff;border-radius:8px;padding:8px 4px;text-align:center;border:1px solid var(--bdr)}
.sc-n{font-size:20px;font-weight:900;line-height:1}.sc-l{font-size:9px;color:var(--muted);margin-top:1px}

.arow{display:flex;gap:6px;margin-bottom:9px}
.abtn{flex:1;padding:9px;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;color:#fff}
.abtn.grn{background:var(--ok)}.abtn.red{background:var(--er)}
.cg{background:#fff;border-radius:10px;margin-bottom:7px;border:1px solid var(--bdr);overflow:hidden}
.cg-h{display:flex;align-items:center;gap:6px;padding:10px 11px;cursor:pointer;background:#F4F7FB}
.cg.open .cg-h{border-bottom:1px solid var(--bdr)}
.cg-n{flex:1;font-size:11px;font-weight:800;color:var(--navy);text-transform:uppercase}
.cgb{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.gb-nd{background:var(--bdr);color:var(--muted)}.gb-ok{background:var(--ok-bg);color:var(--ok)}.gb-er{background:var(--er-bg);color:var(--er)}.gb-wn{background:var(--wn-bg);color:var(--wn)}
.cg-sa{font-size:10px;padding:4px 8px;border:none;background:var(--ok);color:#fff;border-radius:10px;font-weight:700}
.chev{width:13px;height:13px;color:var(--muted);transition:transform .2s;flex-shrink:0}
.cg.open .chev{transform:rotate(180deg)}
.cg-body{display:none}.cg.open .cg-body{display:block}
.cr{padding:9px 11px;border-top:1px solid var(--bdr)}
.cr-top{display:flex;align-items:center;gap:5px;margin-bottom:6px}
.cr-num{font-size:9px;font-weight:900;color:#fff;background:var(--muted);border-radius:10px;padding:1px 6px;min-width:22px;text-align:center}
.cr-name{flex:1;font-size:12px;font-weight:700}.cr-type{font-size:10px;color:var(--muted)}
.cr-ch{font-size:9px;background:var(--bg);border:1px solid var(--bdr);border-radius:4px;padding:1px 5px;color:var(--muted)}
.sbrow{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.sb{padding:7px 2px;border:1.5px solid var(--bdr);border-radius:7px;font-size:10px;font-weight:700;text-align:center;cursor:pointer;background:#fff;color:var(--muted);line-height:1.3}
.sb.s-ok{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}
.sb.s-er{background:var(--er-bg);border-color:var(--er);color:var(--er)}
.sb.s-wn{background:var(--wn-bg);border-color:var(--wn);color:var(--wn)}
.sb.s-in{background:var(--inf-bg);border-color:var(--inf);color:var(--inf)}
.rb{display:none;margin-top:6px}.rb.vis{display:block}
.rb label{display:block;font-size:10px;font-weight:800;color:var(--er);text-transform:uppercase;margin-bottom:3px}
.rb textarea{width:100%;border:1px solid var(--er);border-radius:6px;padding:7px 8px;font-size:12px;background:var(--er-bg);resize:none;font-family:inherit;min-height:48px}
.hp-title{font-size:15px;font-weight:900;color:var(--navy);text-transform:uppercase;letter-spacing:.8px}
.hp-sub{font-size:10px;color:var(--muted);margin-top:2px;margin-bottom:11px}
.hp-sth{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;padding:7px 11px;background:var(--navy);color:#fff;border-radius:7px 7px 0 0;display:flex;align-items:center;justify-content:space-between}
.hp-sth button{font-size:10px;padding:4px 10px;border:none;background:rgba(255,255,255,.2);color:#fff;border-radius:6px;font-weight:700}
.hp-wrap{border:1px solid var(--bdr);border-top:none;border-radius:0 0 10px 10px;overflow:hidden;margin-bottom:14px}
.eq{background:#fff;border-top:1px solid var(--bdr)}.eq:first-child{border-top:none}
.eq-h{display:flex;align-items:center;gap:7px;padding:8px 11px;background:#F4F7FB;border-bottom:1px solid var(--bdr)}
.eq-id{font-size:11px;font-weight:900;color:#fff;background:var(--navy);padding:2px 8px;border-radius:10px}
.eq-loc{font-size:12px;font-weight:700;flex:1}
.eq-dot{width:10px;height:10px;border-radius:50%;background:var(--bdr)}
.eq-dot.d-ok{background:var(--ok)}.eq-dot.d-er{background:var(--er)}
.eq-body{padding:9px 11px}
.eq-side{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px}
.eq-side:last-child{margin-bottom:0}
.eq-sl{font-size:10px;font-weight:800;color:var(--muted);min-width:48px;padding-top:9px;text-transform:uppercase}
.eq-sc{flex:1}
.eq-brow{display:flex;gap:6px}

.eb.e-er{background:var(--er-bg);border-color:var(--er);color:var(--er)}

.toast.show{opacity:1}

.hist-item{background:#fff;border:1px solid var(--bdr);border-radius:8px;margin-bottom:6px;overflow:hidden}
.hist-h{display:flex;align-items:center;gap:8px;padding:9px 11px}
.hist-info{flex:1}
.hist-date{font-size:12px;font-weight:800;color:var(--navy)}
.hist-sub{font-size:10px;color:var(--muted);margin-top:1px}
.hist-stats{font-size:10px;margin-top:3px}
.hist-acts{display:flex;gap:5px;flex-shrink:0}
.hist-btn{font-size:10px;font-weight:700;padding:6px 11px;border:none;border-radius:6px;cursor:pointer}
.hbtn-exp{background:var(--navy);color:#fff}
.hbtn-del{background:var(--er-bg);color:var(--er)}
.no-hist{text-align:center;color:var(--muted);font-size:12px;padding:16px;background:#fff;border-radius:8px;border:1px solid var(--bdr)}
</style>
</head>

function toast(m){var t=document.getElementById("toast");t.textContent=m;t.className="toast show";setTimeout(function(){t.className="toast";},2200);}

function showTab(id){
  ["cameras","helppoints","report"].forEach(function(x){
    document.getElementById("panel-"+x).className="panel"+(x===id?" on":"");
    document.getElementById("t-"+x).className="tab"+(x===id?" on":"");
  });
  if(id==="report")refreshRep();
}

// CAMERAS
function buildCams(){
  var p=document.getElementById("panel-cameras");
  var h="<div class='srow'><div class='sc t'><div class='sc-n'>154</div><div class='sc-l'>Total</div></div><div class='sc ok'><div class='sc-n' id='cs-ok'>0</div><div class='sc-l'>Working</div></div><div class='sc er'><div class='sc-n' id='cs-er'>0</div><div class='sc-l'>Faulty</div></div><div class='sc wn'><div class='sc-n' id='cs-wn'>0</div><div class='sc-l'>Other</div></div></div>";
  h+="<div class='arow'><button class='abtn grn' onclick='allCamsOk()'>All 154 Working</button><button class='abtn red' onclick='clearCams()'>Clear All</button></div>";
  CG.forEach(function(g,gi){
    h+="<div class='cg' id='cg"+gi+"'><div class='cg-h' onclick='toggleCg("+gi+")'><span class='cg-n'>"+g.j+"</span><span class='cgb gb-nd' id='cgb"+gi+"'>"+g.c.length+" cam"+(g.c.length>1?"s":"")+"</span><button class='cg-sa' onclick='event.stopPropagation();grpOk("+gi+")'>All OK</button><svg class='chev' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.5'><polyline points='6 9 12 15 18 9'/></svg></div><div class='cg-body' id='cgb-"+gi+"'>";
    g.c.forEach(function(cam){
      var n=cam[0],nm=cam[1],tp=cam[2],ch=cam[3];
      h+="<div class='cr' id='cr"+n+"'><div class='cr-top'><span class='cr-num'>"+n+"</span><span class='cr-name'>"+nm+"</span><span class='cr-type'>"+tp+"</span><span class='cr-ch'>Ch "+ch+"</span></div>";
      h+="<div class='sbrow'>";
      h+="<button class='sb' id='sb"+n+"ok' onclick='setC("+n+",\"ok\")'>Working</button>";
      h+="<button class='sb' id='sb"+n+"er' onclick='setC("+n+",\"er\")'>Faulty</button>";
      h+="<button class='sb' id='sb"+n+"wn' onclick='setC("+n+",\"wn\")'>Cleaning</button>";
      h+="<button class='sb' id='sb"+n+"in' onclick='setC("+n+",\"in\")'>Unclear</button>";
      h+="</div><div class='rb' id='rb"+n+"'><label>Fault Reason</label><textarea rows='2' placeholder='Describe the issue...' oninput='S.cr["+n+"]=this.value;save()'></textarea></div></div>";
    });
    h+="</div></div>";
  });
  p.innerHTML=h;
  updateCamAll();
}

function toggleCg(gi){
  var d=document.getElementById("cg"+gi);
  var b=document.getElementById("cgb-"+gi);
  if(d.className==="cg"){d.className="cg open";b.style.display="block";}
  else{d.className="cg";b.style.display="";}
}

function setC(n,st){
  if(S.cs[n]===st){delete S.cs[n];delete S.cr[n];}
  else{S.cs[n]=st;if(st==="ok")delete S.cr[n];}
  save();updateCamRow(n);updateCamStats();updateGrpBadge(n);
}

function updateCamRow(n){
  var st=S.cs[n]||null;
  ["ok","er","wn","in"].forEach(function(s){
    var b=document.getElementById("sb"+n+s);
    if(b)b.className="sb"+(st===s?" s-"+s:"");
  });
  var rb=document.getElementById("rb"+n);
  if(rb){
    rb.className="rb"+(st&&st!=="ok"?" vis":"");
    var ta=rb.querySelector("textarea");
    if(ta)ta.value=S.cr[n]||"";
  }
}

function updateCamAll(){
  CG.forEach(function(g,gi){g.c.forEach(function(c){updateCamRow(c[0]);});updateGrpBadgeIdx(gi);});
  updateCamStats();
}

function updateGrpBadge(n){
  CG.forEach(function(g,gi){if(g.c.some(function(c){return c[0]===n;}))updateGrpBadgeIdx(gi);});
}

function updateGrpBadgeIdx(gi){
  var g=CG[gi],sts=g.c.map(function(c){return S.cs[c[0]]||null;});
  var b=document.getElementById("cgb"+gi);if(!b)return;
  if(!sts.some(function(s){return s;})){b.className="cgb gb-nd";b.textContent=g.c.length+" cam"+(g.c.length>1?"s":"");}
  else if(sts.every(function(s){return s==="ok";})){b.className="cgb gb-ok";b.textContent="All OK";}
  else if(sts.some(function(s){return s==="er";})){b.className="cgb gb-er";b.textContent=sts.filter(function(s){return s==="er";}).length+" Faulty";}
  else{b.className="cgb gb-wn";b.textContent="Issues";}
}

function updateCamStats(){
  var a=CG.reduce(function(acc,g){return acc.concat(g.c.map(function(c){return S.cs[c[0]]||null;}));},[]);
  var ok=document.getElementById("cs-ok"),er=document.getElementById("cs-er"),wn=document.getElementById("cs-wn");
  if(ok)ok.textContent=a.filter(function(s){return s==="ok";}).length;
  if(er)er.textContent=a.filter(function(s){return s==="er";}).length;
  if(wn)wn.textContent=a.filter(function(s){return s&&s!=="ok"&&s!=="er";}).length;
}

function allCamsOk(){
  CG.forEach(function(g){g.c.forEach(function(c){S.cs[c[0]]="ok";delete S.cr[c[0]];});});
  save();updateCamAll();toast("All 154 cameras marked Working");
}
function clearCams(){S.cs={};S.cr={};save();updateCamAll();toast("Cleared all camera statuses");}
function grpOk(gi){
  CG[gi].c.forEach(function(c){S.cs[c[0]]="ok";delete S.cr[c[0]];});
  save();CG[gi].c.forEach(function(c){updateCamRow(c[0]);});updateGrpBadgeIdx(gi);updateCamStats();
  toast(CG[gi].j+" - All OK");
}

function buildHP(){
  var p=document.getElementById("panel-helppoints");
  var h="<div class='hp-title'>HELP POINTS CHECK UP</div><div class='hp-sub'>MUZ01 Station - Lifts & Emergency Safety Points</div>";
  h+="<div class='hp-sth'>LIFTS HELP POINTS INSPECTION<button onclick='allElvOk()'>All Working</button></div><div class='hp-wrap' id='elv-wrap'>";
  ELV.forEach(function(e){h+=mkEq("elv",e.id,"MUZ01-"+e.id+" - "+e.loc);});
  h+="</div>";
  h+="<div class='hp-sth'>PESB STATUS INSPECTION<button onclick='allPespOk()'>All Working</button></div><div class='hp-wrap' id='pesp-wrap'>";
  PESB.forEach(function(e){h+=mkPesp(e.id,"MUZ01-"+e.id+" - "+e.plat);});
  h+="</div>";
  p.innerHTML=h;
  updateEqAll();
}

function mkEq(type,id,label){
  var num=id.replace(/[A-Z]+/g,"");
  var h="<div class='eq' id='eq-"+type+"-"+id+"'>";
  h+="<div class='eq-h'><span class='eq-id'>"+num+"</span><span class='eq-loc'>"+label+"</span><div class='eq-dot' id='dot-"+type+"-"+id+"'></div></div>";
  h+="<div class='eq-body'>";
  ["out","in"].forEach(function(side){
    var sl=side==="out"?"Outside":"Inside";
    h+="<div class='eq-side'><div class='eq-sl'>"+sl+"</div><div class='eq-sc'><div class='eq-brow'>";
    h+="<button class='eb' id='eb-"+type+"-"+id+"-"+side+"-ok' onclick='setEq(\""+type+"\",\""+id+"\",\""+side+"\",\"ok\")'>Working</button>";
    h+="<button class='eb' id='eb-"+type+"-"+id+"-"+side+"-er' onclick='setEq(\""+type+"\",\""+id+"\",\""+side+"\",\"er\")'>Has Issue</button>";
    h+="</div><div class='eq-rb' id='eqrb-"+type+"-"+id+"-"+side+"'><textarea placeholder='Describe the issue...' oninput='setEqR(\""+type+"\",\""+id+"\",\""+side+"R\",this.value)'></textarea></div></div></div>";
  });
  h+="</div></div>";
  return h;
}

function mkPesp(id,label){
  var num=id.replace(/[A-Z]+/g,"");
  var h="<div class='eq' id='eq-pesp-"+id+"'>";
  h+="<div class='eq-h'><span class='eq-id'>"+num+"</span><span class='eq-loc'>"+label+"</span><div class='eq-dot' id='dot-pesp-"+id+"'></div></div>";
  h+="<div class='eq-body'>";
  h+="<div class='eq-side'><div class='eq-sc'><div class='eq-brow'>";
  h+="<button class='eb' id='eb-pesp-"+id+"-out-ok' onclick='setEq(\"pesp\",\""+id+"\",\"out\",\"ok\")'>Working</button>";
  h+="<button class='eb' id='eb-pesp-"+id+"-out-er' onclick='setEq(\"pesp\",\""+id+"\",\"out\",\"er\")'>Has Issue</button>";
  h+="</div><div class='eq-rb' id='eqrb-pesp-"+id+"-out'><textarea placeholder='Describe the issue...' oninput='setEqR(\"pesp\",\""+id+"\",\"outR\",this.value)'></textarea></div></div></div>";
  h+="</div></div>";
  return h;
}

function getEqSt(type,id){return type==="elv"?(S.es[id]||{}):(S.ps[id]||{});}
function setEqR(type,id,key,val){var o=type==="elv"?S.es:S.ps;if(!o[id])o[id]={};o[id][key]=val;save();}

function setEq(type,id,side,status){
  var o=type==="elv"?S.es:S.ps;if(!o[id])o[id]={};
  var rk=side+"R";
  if(o[id][side]===status){delete o[id][side];delete o[id][rk];}
  else{o[id][side]=status;if(status==="ok"){delete o[id][rk];var ta=document.querySelector("#eqrb-"+type+"-"+id+"-"+side+" textarea");if(ta)ta.value="";}}
  save();updateEqCard(type,id);
}

function updateEqCard(type,id){
  var st=getEqSt(type,id);
  var sides=type==="pesp"?["out"]:["out","in"];
  sides.forEach(function(side){
    var s=st[side]||null;
    var ok=document.getElementById("eb-"+type+"-"+id+"-"+side+"-ok");
    var er=document.getElementById("eb-"+type+"-"+id+"-"+side+"-er");
    var rb=document.getElementById("eqrb-"+type+"-"+id+"-"+side);
    if(ok)ok.className="eb"+(s==="ok"?" e-ok":"");
    if(er)er.className="eb"+(s==="er"?" e-er":"");
    if(rb){rb.className="eq-rb"+(s==="er"?" vis":"");var ta=rb.querySelector("textarea");if(ta)ta.value=st[side+"R"]||"";}
  });
  var dot=document.getElementById("dot-"+type+"-"+id);
  if(type==="pesp"){
    if(dot)dot.className="eq-dot"+(st.out==="er"?" d-er":st.out==="ok"?" d-ok":"");
  } else {
    if(dot)dot.className="eq-dot"+(st.out==="er"||st.in==="er"?" d-er":st.out==="ok"&&st.in==="ok"?" d-ok":"");
  }
}

function updateEqAll(){ELV.forEach(function(e){updateEqCard("elv",e.id);});PESB.forEach(function(e){updateEqCard("pesp",e.id);});}
function allElvOk(){ELV.forEach(function(e){S.es[e.id]={out:"ok",in:"ok"};});save();ELV.forEach(function(e){updateEqCard("elv",e.id);});toast("All Lifts Working");}
function allPespOk(){PESB.forEach(function(e){S.ps[e.id]={out:"ok"};});save();PESB.forEach(function(e){updateEqCard("pesp",e.id);});toast("All PESBs Working");}

// REPORT
function buildRep(){
  var p=document.getElementById("panel-report");
  p.innerHTML="<div class='rsec'><div class='rsec-t'>Notes / Observations</div><textarea class='rta' id='ta-notes' placeholder='General notes...' oninput='S.notes=this.value;save()'></textarea></div><div class='rsec'><div class='rsec-t'>Resolved Issues</div><textarea class='rta' id='ta-res' placeholder='Issues resolved this shift...' oninput='S.resolved=this.value;save()'></textarea></div><div class='rsec'><div class='rsec-t'>Active Issues Log</div><div id='iss-log'></div></div><button class='expbtn' onclick='exportPDF()'>Export PDF Report</button><button class='expbtn grey' onclick='newInsp()'>New Inspection</button><div class='rsec' style='margin-top:10px'><div class='hist-hdr'><span class='hist-hdr-t'>&#128203; Report History</span><button class='hist-hdr-clr' onclick='clearAllHist()'>Clear All</button></div><div id='hist-list'>"+renderHistory()+"</div></div>";
}

function refreshRep(){
  var tn=document.getElementById("ta-notes");if(tn)tn.value=S.notes;
  var tr=document.getElementById("ta-res");if(tr)tr.value=S.resolved;
  var log=document.getElementById("iss-log");if(!log)return;
  var iss=[],lbl={er:"Faulty",wn:"Needs Cleaning",in:"Unclear View"};
  CG.forEach(function(g){g.c.forEach(function(c){var n=c[0],nm=c[1],tp=c[2],st=S.cs[n];if(st&&st!=="ok")iss.push({n:"#"+n+" "+nm+" ("+tp+")",s:lbl[st]||st,r:S.cr[n]||""});});});
  ELV.forEach(function(e){var st=S.es[e.id]||{};var num=e.id.replace("L","");if(st.out==="er")iss.push({n:"L"+num+" ("+e.loc+") Outside",s:"Has Issue",r:st.outR||""});if(st.in==="er")iss.push({n:"L"+num+" ("+e.loc+") Inside",s:"Has Issue",r:st.inR||""});});
  PESB.forEach(function(e){var st=S.ps[e.id]||{};var num=e.id.replace("PESB","");if(st.out==="er")iss.push({n:"PESB"+num+" ("+e.plat+")",s:"Has Issue",r:st.outR||""});});
  if(!iss.length){log.innerHTML="<div class='no-iss'>No active issues - All systems nominal</div>";}
  else{log.innerHTML=iss.map(function(i){return"<div class='iss'><div class='iss-n'>"+i.n+" - "+i.s+"</div>"+(i.r?"<div class='iss-r'>"+i.r+"</div>":"")+"</div>";}).join("");}
}

function badges(){
  var ce=CG.reduce(function(a,g){return a+g.c.filter(function(c){return S.cs[c[0]]==="er";}).length;},0);
  var cb=document.getElementById("badge-cam");if(cb){cb.textContent=ce;cb.className="tbadge"+(ce>0?" v":"");}
  var he=0;
  ELV.forEach(function(e){var s=S.es[e.id]||{};if(s.out==="er"||s.in==="er")he++;});
  PESB.forEach(function(e){var s=S.ps[e.id]||{};if(s.out==="er")he++;});
  var hb=document.getElementById("badge-hp");if(hb){hb.textContent=he;hb.className="tbadge"+(he>0?" v":"");}
}

y>";
  rpt+="<div class='hdr'><h1>SAR - MUZ01 Daily Inspection Report</h1><p>Saudi Arabia Railways - Station Operations - For Internal Use Only</p></div>";
  rpt+="<div class='meta'><div class='mf'><b>Date</b><span>"+date+"</span></div><div class='mf'><b>Shift</b><span>"+shift+"</span></div><div class='mf'><b>Inspector</b><span>"+insp+"</span></div><div class='mf'><b>Station</b><span>MUZ01</span></div></div>";
  rpt+="<div class='sec'><div class='sec-t'>Camera Status</div><div class='sec-b'><div class='grid'><div class='stat ok'><div class='n'>"+ok+"</div><div class='l'>Working</div></div><div class='stat er'><div class='n'>"+er+"</div><div class='l'>Faulty</div></div><div class='stat wn'><div class='n'>"+oth+"</div><div class='l'>Other</div></div><div class='stat nd'><div class='n'>"+nc+"</div><div class='l'>Unchecked</div></div></div>";
  rpt+=iss.length?iss.map(function(i){return"<div class='ir'><b>"+i.n+" - "+i.s+"</b>"+(i.r?"<br>"+i.r:"")+"</div>";}).join(""):"<span style='color:#1A7A45;font-weight:700'>All checked cameras working</span>";
  rpt+="</div></div>";
  rpt+="<div class='sec'><div class='sec-t'>Lifts Help Points Status</div><div class='sec-b'><table><tr><th>#</th><th>Location</th><th>Outside</th><th>Notes</th><th>Inside</th><th>Notes</th></tr>"+er2+"</table></div></div>";
  rpt+="<div class='sec'><div class='sec-t'>PESB Status</div><div class='sec-b'><table><tr><th>#</th><th>Platform</th><th>Status</th><th>Notes</th></tr>"+pr+"</table></div></div>";

function newInsp(){
  saveToHistory();
  S={date:new Date().toISOString().slice(0,10),shift:"",inspector:"",cs:{},cr:{},es:{},ps:{},notes:"",resolved:""};
  save();location.reload();
}

function saveToHistory(){
  if(!S.date&&!S.shift&&!S.inspector) return;
  try{
    var hist=JSON.parse(localStorage.getItem("sar6_hist")||"[]");
    // avoid duplicate: same date+shift+inspector
    var dup=hist.findIndex(function(h){return h.date===S.date&&h.shift===S.shift&&h.inspector===S.inspector;});
    var entry=JSON.parse(JSON.stringify(S));
    entry._saved=new Date().toISOString();
    if(dup>=0) hist[dup]=entry; else hist.unshift(entry);
    if(hist.length>100) hist=hist.slice(0,100);
    localStorage.setItem("sar6_hist",JSON.stringify(hist));
  }catch(e){}
}

function renderHistory(){
  try{
    var hist=JSON.parse(localStorage.getItem("sar6_hist")||"[]");
    if(!hist.length) return "<div class='no-hist'>No saved reports yet.<br>Reports are saved automatically when you Export or start a New Inspection.</div>";
    return hist.map(function(h,i){
      var ok=0,er=0,oth=0,nc=0;
      CG.forEach(function(g){g.c.forEach(function(c){var st=(h.cs||{})[c[0]];if(!st)nc++;else if(st==="ok")ok++;else if(st==="er")er++;else oth++;});});
      var saved=h._saved?new Date(h._saved).toLocaleString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}):"";
      var statsHtml="<span style='color:var(--ok)'>&#9679; "+ok+" OK</span> &nbsp;<span style='color:var(--er)'>&#9679; "+er+" Faulty</span> &nbsp;<span style='color:var(--wn)'>&#9679; "+oth+" Other</span>"+(nc?" &nbsp;<span style='color:var(--muted)'>"+nc+" Unchecked</span>":"");
      return "<div class='hist-item'><div class='hist-h'><div class='hist-info'><div class='hist-date'>"+h.date+" &nbsp;·&nbsp; "+(h.shift||"No shift selected")+"</div><div class='hist-sub'>"+(h.inspector||"No inspector")+(saved?" &nbsp;·&nbsp; Saved: "+saved:"")+"</div><div class='hist-stats'>"+statsHtml+"</div></div><div class='hist-acts'><button class='hist-btn hbtn-exp' onclick='reExport("+i+")'>Export</button><button class='hist-btn hbtn-del' onclick='delHist("+i+")'>Del</button></div></div></div>";
    }).join("");
  }catch(e){return "<div class='no-hist'>Error loading history</div>";}
}

function reExport(idx){
  try{
    var hist=JSON.parse(localStorage.getItem("sar6_hist")||"[]");
    var orig=JSON.parse(JSON.stringify(S));
    S=hist[idx];
    exportPDF();
    S=orig;
  }catch(e){}
}

function delHist(idx){
  try{
    var hist=JSON.parse(localStorage.getItem("sar6_hist")||"[]");
    hist.splice(idx,1);
    localStorage.setItem("sar6_hist",JSON.stringify(hist));
    document.getElementById("hist-list").innerHTML=renderHistory();
    toast("Report removed from history");
  }catch(e){}
}

function clearAllHist(){
  if(!confirm("Clear all saved report history?")) return;
  localStorage.removeItem("sar6_hist");
  document.getElementById("hist-list").innerHTML=renderHistory();
  toast("History cleared");
}

// INIT
load();
document.getElementById("fDate").value=S.date;
document.getElementById("fShift").value=S.shift;
document.getElementById("fInsp").value=S.inspector;
buildCams();
buildHP();
buildRep();
badges();
</script>
</body>
